<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #0f172a, #111827, #020617);
  color: #e5e7eb;
  overflow-x: hidden;
}

/* PARTICLES */
#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px 10px;
  position: relative;
  z-index: 1;
}

.avatar-wrapper {
  width: 100px;
  height: 100px;
  margin: auto;
  padding: 4px;
  border-radius: 50%;
  background: linear-gradient(45deg, #38bdf8, #22c55e, #a855f7);
  box-shadow: 0 0 30px rgba(56,189,248,0.4);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.title {
  font-size: 28px;
  font-weight: 800;
}

.sub {
  color: #94a3b8;
  font-size: 13px;
}

/* TABS */
.tabs {
  position: relative;
  display: flex;
  justify-content: center;
  margin: 20px;
  gap: 10px;
  z-index: 1;
}

.tab-btn {
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.tab-btn.active {
  background: linear-gradient(45deg, #3b82f6, #22c55e);
  border: none;
}

.underline {
  position: absolute;
  bottom: -5px;
  left: 0;
  height: 3px;
  width: 0;
  background: #38bdf8;
  border-radius: 10px;
  transition: 0.3s ease;
}

/* CONTENT */
.content-wrapper {
  position: relative;
  overflow: hidden;
  min-height: 300px;
  z-index: 1;
}

.tab-content {
  position: absolute;
  width: 100%;
  top: 0;
  left: 100%;
  opacity: 0;
  transition: all 0.4s ease;
}

.tab-content.active {
  left: 0;
  opacity: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 10px 20px;
}

/* CARD */
.card {
  position: relative;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: 0.3s;
  overflow: hidden;
}

/* NEON GLOW */
.card:hover {
  transform: translateY(-6px) scale(1.05);
  box-shadow:
    0 0 10px #38bdf8,
    0 0 20px #22c55e,
    0 0 40px rgba(56,189,248,0.4);
}

.name {
  font-size: 17px;
  font-weight: 600;
}

.price {
  font-size: 22px;
  color: #38bdf8;
  margin-top: 6px;
}

/* FREE CARD */
.free-card {
  grid-column: span 2;
  display: flex;
  gap: 15px;
  align-items: center;
  background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(59,130,246,0.1));
  border: 1px solid rgba(34,197,94,0.5);
}

.product-img {
  width: 80px;
  height: 80px;
  border-radius: 12px;
  object-fit: cover;
}

.free-badge {
  background: #22c55e;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  display: inline-block;
  margin-bottom: 5px;
}

/* RIPPLE */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.5);
  animation: ripple 0.6s linear;
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Premium Proxy Service</div>
</div>

<div class="tabs">
  <div class="tab-btn active">💸 BuyNow</div>
  <div class="tab-btn">🆓 Free</div>
  <div id="underline" class="underline"></div>
</div>

<div class="content-wrapper" id="slider">

  <div id="buy" class="tab-content active">
    <div class="grid">

      <div class="card ripple-btn" onclick="buy(event)">Proxy 1 Day<br><b>30VND</b></div>
      <div class="card ripple-btn" onclick="buy(event)">Proxy 7 Days<br><b>70VND</b></div>
      <div class="card ripple-btn" onclick="buy(event)">Proxy 30 Days<br><b>150VND</b></div>
      <div class="card ripple-btn" onclick="buy(event)">Proxy VIP<br><b>200VND</b></div>

    </div>
  </div>

  <div id="free" class="tab-content">
    <div class="grid">

      <div class="card free-card ripple-btn" onclick="openFree(event)">
        <img src="pin.jpg" class="product-img">
        <div>
          <div class="free-badge">FREE</div>
          <div class="name">Proxy Pin Mod</div>
          <div class="price">0 VND</div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
/* TAB SWIPE */
let startX = 0;
const slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) switchTab(1);
  if (endX - startX > 50) switchTab(0);
});

function switchTab(index){
  const tabs = document.querySelectorAll(".tab-content");
  const btns = document.querySelectorAll(".tab-btn");

  tabs.forEach(t => t.classList.remove("active"));
  btns.forEach(b => b.classList.remove("active"));

  tabs[index].classList.add("active");
  btns[index].classList.add("active");

  moveUnderline(index);
}

document.querySelectorAll(".tab-btn")[0].onclick = ()=>switchTab(0);
document.querySelectorAll(".tab-btn")[1].onclick = ()=>switchTab(1);

/* UNDERLINE */
function moveUnderline(index){
  const btns = document.querySelectorAll(".tab-btn");
  const underline = document.getElementById("underline");
  const btn = btns[index];

  underline.style.width = btn.offsetWidth + "px";
  underline.style.left = btn.offsetLeft + "px";
}

window.onload = ()=>moveUnderline(0);

/* BUY */
function buy(e){
  rippleEffect(e);
  window.open("https://zalo.me/84989288257","_blank");
}

function openFree(e){
  rippleEffect(e);
  window.open("https://link4m.com/GyCC2","_blank");
}

/* RIPPLE EFFECT */
function rippleEffect(e){
  const btn = e.currentTarget;
  const circle = document.createElement("span");
  const rect = btn.getBoundingClientRect();

  const size = Math.max(rect.width, rect.height);
  circle.style.width = circle.style.height = size + "px";
  circle.style.left = e.clientX - rect.left - size/2 + "px";
  circle.style.top = e.clientY - rect.top - size/2 + "px";
  circle.classList.add("ripple");

  btn.appendChild(circle);
  setTimeout(()=>circle.remove(),600);
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.6)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>

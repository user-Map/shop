<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  color: white;
  background: linear-gradient(120deg, #020617, #020617, #000);
  background-size: 200% 200%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* HERO */
.header {
  text-align: center;
  padding: 50px 20px 30px;
}

.avatar-wrapper {
  width: 110px;
  height: 110px;
  margin: auto;
  padding: 4px;
  border-radius: 50%;
  background: linear-gradient(45deg, #3b82f6, #22c55e, #a855f7);
  box-shadow: 0 0 50px rgba(59,130,246,0.6);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.title {
  font-size: 32px;
  font-weight: 800;
  margin-top: 12px;
}

.sub {
  color: #94a3b8;
  font-size: 14px;
}

/* SECTION */
.packages {
  padding: 20px;
}

.section-title {
  margin: 20px 0 10px;
  color: #60a5fa;
  font-weight: bold;
  text-align: center;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* CARD */
.card {
  position: relative;
  padding: 20px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s ease;
  overflow: hidden;
}

/* gradient glow */
.card::before {
  content: "";
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 60%);
  transform: rotate(0deg);
}

.card:hover {
  transform: translateY(-10px) scale(1.04);
  box-shadow: 0 25px 70px rgba(0,0,0,0.8);
}

/* ICON */
.icon {
  width: 40px;
  height: 40px;
  margin-bottom: 10px;
  border-radius: 10px;
  background: linear-gradient(45deg, #3b82f6, #22c55e);
}

/* TEXT */
.name {
  font-size: 18px;
  font-weight: 700;
}

.price {
  font-size: 26px;
  color: #60a5fa;
  margin-top: 8px;
}

/* CTA BUTTON STYLE */
.cta {
  margin-top: 12px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  font-weight: 600;
}

/* FREE */
.free-card {
  grid-column: span 2;
  background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(59,130,246,0.1));
  border: 1px solid rgba(34,197,94,0.5);
}

.free-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #22c55e;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
}

/* CONTACT */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 14px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

.contact-item {
  padding: 12px;
  cursor: pointer;
}

.contact-item:hover {
  background: rgba(255,255,255,0.08);
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  padding: 20px;
}

/* MOBILE */
@media(max-width:600px){
  .grid{
    grid-template-columns: 1fr;
  }
  .free-card{
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<div class="header">

    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Fast • Stable • Premium Proxy</div>
</div>

</div>

<div class="contact">

<div class="footer">© Proxy UserMap</div>

</body>
</html>

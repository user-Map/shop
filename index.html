<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #0f172a, #111827, #020617);
  color: #e5e7eb;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px 10px;
}

.avatar-wrapper {
  width: 100px;
  height: 100px;
  margin: auto;
  padding: 4px;
  border-radius: 50%;
  background: linear-gradient(45deg, #38bdf8, #22c55e, #a855f7);
  box-shadow: 0 0 30px rgba(56,189,248,0.4);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.title {
  font-size: 28px;
  font-weight: 800;
}

.sub {
  color: #94a3b8;
  font-size: 13px;
}

/* TABS */
.tabs {
  position: relative;
  display: flex;
  justify-content: center;
  margin: 20px;
  gap: 10px;
}

.tab-btn {
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.tab-btn.active {
  background: linear-gradient(45deg, #3b82f6, #22c55e);
  border: none;
}

/* UNDERLINE */
.underline {
  position: absolute;
  bottom: -5px;
  left: 0;
  height: 3px;
  width: 0;
  background: #38bdf8;
  border-radius: 10px;
  transition: 0.3s ease;
}

/* CONTENT */
.content-wrapper {
  position: relative;
  overflow: hidden;
  min-height: 250px;
}

.tab-content {
  position: absolute;
  width: 100%;
  top: 0;
  left: 100%;
  opacity: 0;
  transition: all 0.4s ease;
}

.tab-content.active {
  left: 0;
  opacity: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  padding: 10px 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px) scale(1.04);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.name {
  font-size: 17px;
  font-weight: 600;
}

.price {
  font-size: 22px;
  color: #38bdf8;
  margin-top: 6px;
}

/* FREE CARD */
.free-card {
  grid-column: span 2;
  display: flex;
  gap: 15px;
  align-items: center;
  background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(59,130,246,0.1));
  border: 1px solid rgba(34,197,94,0.5);
}

.product-img {
  width: 80px;
  height: 80px;
  border-radius: 12px;
  object-fit: cover;
}

.free-badge {
  background: #22c55e;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  display: inline-block;
  margin-bottom: 5px;
}

/* CONTACT */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.15);
}

.contact-item {
  padding: 12px;
  cursor: pointer;
}

.contact-item:hover {
  background: rgba(255,255,255,0.08);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #0f172a;
  padding: 25px;
  border-radius: 14px;
  width: 85%;
  text-align: center;
}

.btn {
  margin-top: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Premium Proxy Service</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab-btn active" onclick="switchTab(event,'buy')">💸 BuyNow</div>
  <div class="tab-btn" onclick="switchTab(event,'free')">🆓 Free</div>
  <div id="underline" class="underline"></div>
</div>

<!-- CONTENT -->
<div class="content-wrapper">

  <!-- BUY -->
  <div id="buy" class="tab-content active">
    <div class="grid">

      <div class="card" onclick="buy()">Proxy 1 Day<br><b>30VND</b></div>
      <div class="card" onclick="buy()">Proxy 7 Days<br><b>70VND</b></div>
      <div class="card" onclick="buy()">Proxy 30 Days<br><b>150VND</b></div>
      <div class="card" onclick="buy()">Proxy VIP<br><b>200VND</b></div>

    </div>
  </div>

  <!-- FREE -->
  <div id="free" class="tab-content">
    <div class="grid">

      <div class="card free-card" onclick="openFree()">
        <img src="pin.jpg" class="product-img">
        <div>
          <div class="free-badge">FREE</div>
          <div class="name">Proxy Pin Mod</div>
          <div class="price">0 VND</div>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- CONTACT -->
<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">Zalo Support</div>
  </div>
</div>

<div class="footer" style="text-align:center;color:#94a3b8;padding:20px;">
  © Proxy UserMap
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Proxy Pin Mod</h3>
    <button class="btn" onclick="goDownload()">Tải ngay</button>
    <br><br>
    <button class="btn" onclick="closeModal()">Đóng</button>
  </div>
</div>

<script>
function switchTab(e, tab){
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  e.target.classList.add('active');

  const underline = document.getElementById('underline');
  underline.style.width = e.target.offsetWidth + "px";
  underline.style.left = e.target.offsetLeft + "px";
}

window.onload = () => {
  const active = document.querySelector('.tab-btn.active');
  const underline = document.getElementById('underline');
  underline.style.width = active.offsetWidth + "px";
  underline.style.left = active.offsetLeft + "px";
};

function buy(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openFree(){
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function goDownload(){
  window.open("https://link4m.com/GyCC2","_blank");
}
</script>

</body>
</html>

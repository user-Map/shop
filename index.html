<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProXy Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  overflow-x: hidden;
}

/* nền động nhẹ */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,198,255,0.15), transparent 60%);
  animation: moveBg 10s linear infinite;
}
@keyframes moveBg {
  0% {transform: translate(0,0);}
  50% {transform: translate(-50px,-50px);}
  100% {transform: translate(0,0);}
}

/* container */
.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
  padding-top: 30px;
  padding-bottom: 120px;
  position: relative;
  z-index: 2;
}

/* card */
.card {
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* avatar */
.avatar-box {
  text-align: center;
}
.avatar {
  width: 85px;
  border-radius: 50%;
  border: 2px solid #00c6ff;
  box-shadow: 0 0 15px #00c6ff;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {box-shadow: 0 0 10px #00c6ff;}
  to {box-shadow: 0 0 25px #00c6ff;}
}

/* text */
.title {
  text-align: center;
  font-size: 20px;
  margin-top: 10px;
}
.sub {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
}

/* package */
.package {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
  animation: showUp 0.6s forwards;
}

.package:nth-child(1){animation-delay:0.3s;}
.package:nth-child(2){animation-delay:0.5s;}
.package:nth-child(3){animation-delay:0.7s;}

@keyframes showUp {
  to {opacity:1; transform: translateY(0);}
}

.package:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

/* vip */
.vip {
  border: 1px solid gold;
  box-shadow: 0 0 20px gold;
}

/* button */
.btn {
  padding: 8px 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.btn.clicked {transform: scale(0.9);}

/* ripple */
.ripple {
  position: absolute;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0);
  animation: ripple 0.4s linear;
}
@keyframes ripple {
  to {transform: translate(-50%,-50%) scale(3); opacity:0;}
}

/* footer */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  text-align: center;
  padding: 10px;
  font-size: 13px;
}

.footer a {
  color: #00c6ff;
  text-decoration: none;
  margin: 0 5px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="avatar-box">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
</div>

<div class="title">🔥 ProXy Premium</div>
<div class="sub">Dịch vụ xịn – tốc độ cao 😈</div>

<!-- packages -->
<div class="package">
<div>
<b>Premium v1 ProXy</b><br><small>1 Ngày</small>
</div>
<button class="btn" onclick="buy(this)">30k 💸</button>
</div>

<div class="package">
<div>
<b>Premium v2 ProXy</b><br><small>7 Ngày</small>
</div>
<button class="btn" onclick="buy(this)">70k 💸</button>
</div>

<div class="package vip">
<div>
<b>Premium v3 ProXy</b><br><small>30 Ngày • VIP</small>
</div>
<button class="btn" onclick="buy(this)">150k 💸</button>
</div>

</div>

</div>

<!-- footer -->
<div class="footer">
📞 <b>Liên hệ:</b> 
<a href="https://zalo.me/84989288257" target="_blank">Zalo</a> |
<a href="https://discord.gg/yzRS57WB" target="_blank">Discord</a>
<br>
⚠️ Lưu ý: IB Zalo để được tư vấn trực tiếp
</div>

<script>
function buy(btn){
  btn.classList.add("clicked");

  const ripple = document.createElement("span");
  ripple.className="ripple";
  btn.appendChild(ripple);

  setTimeout(()=>{
    ripple.remove();
    btn.classList.remove("clicked");
    window.open("https://zalo.me/84989288257","_blank");
  },300);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
}

.avatar-wrapper {
  width: 100px;
  height: 100px;
  margin: auto;
  padding: 4px;
  border-radius: 50%;
  background: conic-gradient(#3b82f6, #22c55e, #a855f7);
  display: flex;
  align-items: center;
  justify-content: center;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.title {
  font-size: 26px;
  font-weight: 700;
}

.sub {
  font-size: 13px;
  color: #94a3b8;
}

/* GRID */
.packages {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 16px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.card:active {
  transform: scale(0.97);
}

.name {
  font-size: 16px;
  font-weight: 600;
}

.price {
  font-size: 22px;
  color: #60a5fa;
  margin-top: 8px;
}

/* FREE */
.free-card {
  grid-column: span 2;
  border: 1px solid rgba(34,197,94,0.4);
  background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(59,130,246,0.08));
}

.free-badge {
  display: inline-block;
  background: #22c55e;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11px;
  margin-bottom: 8px;
}

/* CONTACT */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 12px;
  padding: 10px;
}

.contact-item {
  padding: 12px;
  cursor: pointer;
}

.contact-item:hover {
  background: rgba(255,255,255,0.08);
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  padding: 20px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #0f172a;
  padding: 25px;
  border-radius: 14px;
  width: 85%;
  text-align: center;
}

.btn {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Premium Proxy Service</div>
</div>

<div class="packages">

<div class="grid">

<div class="card" onclick="buy()">
  <div class="name">Proxy 1 Day</div>
  <div class="price">30VND</div>
</div>

<div class="card" onclick="buy()">
  <div class="name">Proxy 7 Days</div>
  <div class="price">70VND</div>
</div>

<div class="card" onclick="buy()">
  <div class="name">Proxy 30 Days</div>
  <div class="price">150VND</div>
</div>

<div class="card" onclick="buy()">
  <div class="name">Proxy VIP</div>
  <div class="price">200VND</div>
</div>

<div class="card free-card" onclick="openFree()">
  <div class="free-badge">FREE</div>
  <div class="name">Proxy Pin Mod</div>
  <div class="price">0 VND</div>
</div>

</div>

</div>

<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">Zalo Support</div>
  </div>
</div>

<div class="footer">© Proxy UserMap</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Proxy Pin Mod</h3>
    <p>Tải file tại đây</p>
    <button class="btn" onclick="goDownload()">Tải ngay</button>
    <br><br>
    <button class="btn" onclick="closeModal()">Đóng</button>
  </div>
</div>

<script>
function buy(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openFree(){
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function goDownload(){
  window.open("https://link4m.com/GyCC2","_blank");
}
</script>

</body>
</html>

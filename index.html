<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UserMap Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth" class="center">
  <div class="card">
    <h2 class="title">Login</h2>

    <div class="field">
      <input id="email" type="email" placeholder="Email">
    </div>

    <div class="field">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="register()">Register</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div>👤 <span id="user"></span></div>
    <div id="balance">Balance: 0</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="tabs">
    <button onclick="showTab('buy')">💸 BuyNow</button>
    <button onclick="showTab('free')">🆓 AimDrag</button>
  </div>

  <div id="buy" class="tab">
    <div class="card product">
      <h3>1 Day</h3>
      <p>30.000 VNĐ</p>
      <button onclick="buy(30000,'1 Day')">Buy</button>
    </div>

    <div class="card product">
      <h3>7 Days</h3>
      <p>70.000 VNĐ</p>
      <button onclick="buy(70000,'7 Days')">Buy</button>
    </div>

    <div class="card product">
      <h3>30 Days</h3>
      <p>150.000 VNĐ</p>
      <button onclick="buy(150000,'30 Days')">Buy</button>
    </div>

    <div class="card">
      <h3>💰 Nạp tiền</h3>
      <p>Chuyển khoản / ZaloPay</p>
      <p>Nội dung: USERID</p>
    </div>
  </div>

  <div id="free" class="tab" style="display:none;">
    <div class="card">
      <h3>AimDrag Free</h3>
      <p>Download / Use free tools</p>
      <button onclick="alert('Free feature')">Open</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(180deg, #020617, #000);
  color: white;
}

/* HERO */
.header {
  text-align: center;
  padding: 40px 20px;
  background: radial-gradient(circle at top, rgba(59,130,246,0.2), transparent 60%);
}

.avatar-wrapper {
  width: 110px;
  height: 110px;
  margin: auto;
  padding: 4px;
  border-radius: 50%;
  background: linear-gradient(45deg, #3b82f6, #22c55e, #a855f7);
  box-shadow: 0 0 40px rgba(59,130,246,0.5);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.title {
  font-size: 30px;
  font-weight: 800;
  margin-top: 10px;
}

.sub {
  font-size: 14px;
  color: #94a3b8;
}

/* GRID */
.packages {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* CARD */
.card {
  position: relative;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 18px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s ease;
  overflow: hidden;
}

/* glow border */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  padding: 1px;
  background: linear-gradient(45deg, transparent, rgba(59,130,246,0.5), transparent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  pointer-events: none;
}

.card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

/* TEXT */
.name {
  font-size: 17px;
  font-weight: 600;
}

.price {
  font-size: 24px;
  color: #60a5fa;
  margin-top: 8px;
}

/* FREE */
.free-card {
  grid-column: span 2;
  background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(59,130,246,0.1));
  border: 1px solid rgba(34,197,94,0.5);
}

.free-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #22c55e;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: bold;
}

/* BUTTON (optional if needed later) */
.btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}

/* CONTACT */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 14px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

.contact-item {
  padding: 12px;
  cursor: pointer;
}

.contact-item:hover {
  background: rgba(255,255,255,0.08);
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  padding: 20px;
}

/* MOBILE */
@media(max-width: 500px){
  .grid {
    grid-template-columns: 1fr;
  }
  .free-card {
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Premium Proxy • Fast • Stable</div>
</div>

<div class="packages">
  <div class="grid">

    <div class="card" onclick="buy()">
      <div class="name">Proxy 1 Day</div>
      <div class="price">30VND</div>
    </div>

    <div class="card" onclick="buy()">
      <div class="name">Proxy 7 Days</div>
      <div class="price">70VND</div>
    </div>

    <div class="card" onclick="buy()">
      <div class="name">Proxy 30 Days</div>
      <div class="price">150VND</div>
    </div>

    <div class="card" onclick="buy()">
      <div class="name">Proxy VIP</div>
      <div class="price">200VND</div>
    </div>

    <div class="card free-card" onclick="openFree()">
      <div class="free-badge">FREE</div>
      <div class="name">Proxy Pin Mod</div>
      <div class="price">0 VND</div>
    </div>

  </div>
</div>

<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">Zalo Support</div>
  </div>
</div>

<div class="footer">© Proxy UserMap</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;">
  <div style="background:#0f172a;padding:25px;border-radius:14px;width:85%;text-align:center;">
    <h3>Proxy Pin Mod</h3>
    <p>Tải file tại đây</p>
    <button class="btn" onclick="goDownload()">Tải ngay</button>
    <br><br>
    <button class="btn" onclick="closeModal()">Đóng</button>
  </div>
</div>

<script>
function buy(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openFree(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function goDownload(){
  window.open("https://link4m.com/GyCC2","_blank");
}
</script>

</body>
</html>

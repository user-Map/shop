<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProXy Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
}

/* PAGE */
.page {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  padding-top: 40px;
  transition: 0.5s;
}

.hidden {
  transform: translateX(100%);
  opacity: 0;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
}

/* CARD */
.card {
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* PACKAGE */
.package {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.package:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.15);
}

/* BUTTON */
button {
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}

/* VIP */
.vip {
  border: 1px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.7);
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  backdrop-filter: blur(10px);
}

.nav button {
  background: none;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="home" class="page">
  <div class="container">
    <div class="card">
      <h2>🔥 ProXy Premium</h2>

      <div class="package">
        <div>
          <h3>ProXy v1</h3>
          <p>1 Ngày</p>
        </div>
        <button onclick="buy()">30k 💸</button>
      </div>

      <div class="package">
        <div>
          <h3>ProXy v2</h3>
          <p>7 Ngày</p>
        </div>
        <button onclick="buy()">70k 💸</button>
      </div>

      <div class="package vip">
        <div>
          <h3>ProXy v3</h3>
          <p>30 Ngày • Premium</p>
        </div>
        <button onclick="buy()">150k 💸</button>
      </div>

    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="about" class="page hidden">
  <div class="container">
    <div class="card">
      <h2>📌 Thông tin</h2>
      <p>Shop ProXy xịn 😈</p>
      <button onclick="goHome()">⬅️ Quay lại</button>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goHome()">🏠</button>
  <button onclick="goAbout()">📄</button>
</div>

<script>
function buy() {
  window.open("https://zalo.me/84989288257", "_blank");
}

function goAbout() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("about").classList.remove("hidden");
}

function goHome() {
  document.getElementById("about").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>

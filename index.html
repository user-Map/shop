<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Shop</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0b0f19;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px 15px;
}

.avatar {
  width: 80px;
  border-radius: 50%;
  box-shadow: 0 0 25px rgba(0,255,255,0.5);
}

.title {
  margin-top: 10px;
  font-weight: 600;
}

.sub {
  font-size: 13px;
  color: #9ca3af;
}

.status {
  margin-top: 5px;
  font-size: 12px;
  color: #22c55e;
}

/* SHOP */
.shop {
  padding: 15px;
}

/* ITEM */
.item {
  background: #111827;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.25s;
  border: 1px solid transparent;
  position: relative;
}

.item:hover {
  background: #1f2937;
  transform: translateY(-2px);
}

.item:active {
  transform: scale(0.96);
}

.item.active {
  border: 1px solid #3b82f6;
  box-shadow: 0 0 25px rgba(59,130,246,0.5);
}

/* BEST BADGE */
.badge {
  position: absolute;
  top: -8px;
  right: 10px;
  background: gold;
  color: black;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
}

/* INFO */
.name {
  font-weight: 500;
}

.price {
  font-size: 13px;
  color: #9ca3af;
}

/* BUTTON */
.buy {
  padding: 7px 14px;
  border-radius: 10px;
  background: linear-gradient(45deg,#2563eb,#3b82f6);
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.buy:hover {
  transform: scale(1.05);
}

.buy:active {
  transform: scale(0.9);
}

/* CONTACT */
.contact {
  margin: 20px 15px;
}

.contact-box {
  background: #111827;
  border-radius: 14px;
  padding: 10px;
}

.contact-item {
  display: flex;
  align-items: center;
  padding: 10px;
  border-radius: 10px;
  transition: 0.2s;
  cursor: pointer;
}

.contact-item:hover {
  background: #1f2937;
}

.contact-item img {
  width: 35px;
  border-radius: 50%;
  margin-right: 10px;
}

.contact-text {
  font-size: 14px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 13px;
  padding: 15px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="header">
  <img src="K.PNG" class="avatar">
  <div class="title">Proxy Premium Shop</div>
  <div class="sub">Dịch vụ ổn định • tốc độ cao</div>
  <div class="status">● Online</div>
</div>

<div class="shop">

<div class="item">
  <div>
    <div class="name">Proxy Premium 1 Ngày</div>
    <div class="price">30VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

<div class="item">
  <div>
    <div class="name">Proxy Premium 7 Ngày</div>
    <div class="price">70VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

<div class="item">
  <div class="badge">HOT</div>
  <div>
    <div class="name">Proxy Premium 30 Ngày</div>
    <div class="price">150VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

</div>

<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
      <div class="contact-text">Zalo: 84989288257</div>
    </div>

    <div class="contact-item" onclick="openDiscord()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
      <div class="contact-text">Discord Server</div>
    </div>
  </div>
</div>

<div class="footer">
⚠️ IB Zalo để được tư vấn trực tiếp
</div>

<script>
function buy(btn){
  const item = btn.closest('.item');

  document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
  item.classList.add('active');

  btn.innerText = "Đang xử lý...";
  btn.style.background = "#16a34a";

  setTimeout(()=>{
    window.open("https://zalo.me/84989288257","_blank");
    btn.innerText = "Mua";
    btn.style.background = "linear-gradient(45deg,#2563eb,#3b82f6)";
  },400);
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openDiscord(){
  window.open("https://discord.gg/yzRS57WB","_blank");
}
</script>

</body>
</html>

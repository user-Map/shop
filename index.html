<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProXy Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
  padding-top: 30px;
  padding-bottom: 100px;
}

/* CARD */
.card {
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* AVATAR */
.avatar-box {
  text-align: center;
  margin-bottom: 15px;
}

.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid #00c6ff;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 20px;
  margin-bottom: 5px;
}

.sub {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
}

/* PACKAGE */
.package {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  margin-top: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.package:hover {
  transform: scale(1.04);
  background: rgba(255,255,255,0.15);
}

/* LEFT TEXT */
.left h3 {
  margin: 0;
}

.left p {
  margin: 2px 0 0;
  font-size: 12px;
  opacity: 0.7;
}

/* BUTTON */
.btn {
  padding: 8px 15px;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  transform: scale(1.1);
}

.btn.clicked {
  transform: scale(0.9);
}

/* RIPPLE */
.ripple {
  position: absolute;
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  animation: ripple 0.4s linear;
}

@keyframes ripple {
  to {
    transform: translate(-50%, -50%) scale(3);
    opacity: 0;
  }
}

/* VIP */
.vip {
  border: 1px solid gold;
  box-shadow: 0 0 20px rgba(255,215,0,0.7);
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.6);
  padding: 10px;
  text-align: center;
  font-size: 13px;
}

.footer a {
  color: #00c6ff;
  text-decoration: none;
}

.footer a:hover {
  text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">

  <div class="card">

    <!-- AVATAR -->
    <div class="avatar-box">
      <img src="https://i.imgur.com/1X6Q9ZL.png" class="avatar">
    </div>

    <div class="title">🔥 ProXy Premium</div>
    <div class="sub">Dịch vụ ProXy chất lượng 😈</div>

    <!-- PACKAGES -->
    <div class="package">
      <div class="left">
        <h3>ProXy v1</h3>
        <p>1 Ngày</p>
      </div>
      <button class="btn" onclick="buy(this)">30k 💸</button>
    </div>

    <div class="package">
      <div class="left">
        <h3>ProXy v2</h3>
        <p>7 Ngày</p>
      </div>
      <button class="btn" onclick="buy(this)">70k 💸</button>
    </div>

    <div class="package vip">
      <div class="left">
        <h3>ProXy v3</h3>
        <p>30 Ngày • Premium</p>
      </div>
      <button class="btn" onclick="buy(this)">150k 💸</button>
    </div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  ⚠️ Lưu ý: <a href="https://zalo.me/84989288257" target="_blank">IB Zalo để tư vấn trực tiếp</a>
</div>

<script>
function buy(btn) {
  btn.classList.add("clicked");

  const ripple = document.createElement("span");
  ripple.className = "ripple";
  btn.appendChild(ripple);

  setTimeout(() => {
    ripple.remove();
    btn.classList.remove("clicked");
    window.open("https://zalo.me/84989288257", "_blank");
  }, 300);
}
</script>

</body>
</html>

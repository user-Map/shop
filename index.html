<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Packages</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f7fb;
}

/* header */
.header {
  text-align: center;
  padding: 30px 20px;
}

.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  margin: 0 auto;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.sub {
  font-size: 13px;
  color: #6b7280;
}

/* packages */
.packages {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 15px;
}

/* card */
.card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  transition: 0.25s;
  position: relative;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-3px);
}

.card.active {
  border: 2px solid #2563eb;
}

/* badge */
.badge {
  position: absolute;
  top: -10px;
  right: 15px;
  background: #2563eb;
  color: white;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 8px;
}

/* name */
.name {
  font-weight: 600;
  font-size: 16px;
}

/* price */
.price {
  font-size: 22px;
  font-weight: 700;
  margin: 10px 0;
}

/* feature list */
.features {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 15px;
}

.features div {
  margin: 4px 0;
}

/* button */
.btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: #1d4ed8;
}

.btn:active {
  transform: scale(0.95);
}

/* contact */
.contact {
  margin: 20px;
}

.contact-box {
  background: white;
  border-radius: 15px;
  padding: 10px;
}

.contact-item {
  display: flex;
  align-items: center;
  padding: 12px;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.2s;
}

.contact-item:hover {
  background: #f3f4f6;
}

.contact-item img {
  width: 35px;
  height: 35px;
  object-fit: contain;
  border-radius: 50%;
  margin-right: 10px;
}

.footer {
  text-align: center;
  font-size: 13px;
  color: #6b7280;
  padding: 15px;
}
</style>
</head>

<body>

<div class="header">
  <img src="K.PNG" class="avatar" alt="Avatar">
  <div class="title">Proxy Premium</div>
  <div class="sub">Chọn gói phù hợp với bạn</div>
</div>

<div class="packages">

<div class="card" onclick="selectCard(this)">
  <div class="name">Proxy Premium 1 Ngày</div>
  <div class="price">30VND</div>
  <div class="features">
    <div>✔ Dùng 24h</div>
    <div>✔ Tốc độ cao</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

<div class="card" onclick="selectCard(this)">
  <div class="name">Proxy Premium 7 Ngày</div>
  <div class="price">70VND</div>
  <div class="features">
    <div>✔ Dùng 7 ngày</div>
    <div>✔ Ổn định cao</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

<div class="card" onclick="selectCard(this)">
  <div class="badge">HOT</div>
  <div class="name">Proxy Premium 30 Ngày</div>
  <div class="price">150VND</div>
  <div class="features">
    <div>✔ Dùng 30 ngày</div>
    <div>✔ Support DragAim</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

</div>

<!-- CONTACT -->
<div class="contact">
  <div class="contact-box">

    <div class="contact-item" onclick="openZalo()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo">
      <div>Zalo Chat</div>
    </div>

    <div class="contact-item" onclick="openDiscord()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="Discord">
      <div>Sever Có Proxy Miễn Phí</div>
    </div>

  </div>
</div>

<div class="footer">
⚠️ IB Các nền tảng để hỗ trợ nhanh
</div>

<script>
function selectCard(card){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
}

function buy(e){
  e.stopPropagation();
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openDiscord(){
  window.open("https://discord.gg/BuzAJg4MtE","_blank");
}
</script>

</body>
</html>

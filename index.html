<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Packages</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow-x: hidden;
}

/* SNOW */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

.snowflake {
  position: absolute;
  top: -10px;
  color: white;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
}

.avatar-wrapper {
  width: 95px;
  height: 95px;
  margin: 0 auto 12px;
  padding: 3px;
  border-radius: 50%;
  background: linear-gradient(45deg, #3b82f6, #22c55e, #a855f7);
  display: flex;
  align-items: center;
  justify-content: center;
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

/* layout 2 cột */
.container {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.column {
  flex: 1;
}

.section-title {
  text-align: center;
  margin: 10px 0;
  font-weight: bold;
  color: #60a5fa;
}

/* card */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

/* FREE card */
.free-card {
  border: 1px solid #22c55e;
}

.name { font-weight: 600; }
.price { font-size: 20px; color: #60a5fa; margin: 8px 0; }

/* button */
.btn {
  width: 100%;
  padding: 11px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  color: white;
  cursor: pointer;
}

/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.2);
}

.modal a {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 15px;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div>Proxy Premium</div>
</div>

<div class="container">

  <!-- BUY -->
  <div class="column">
    <div class="section-title">BUY NOW</div>

    <div class="card">
      <div class="name">Proxy 1 Ngày</div>
      <div class="price">30VND</div>
      <button class="btn" onclick="buy()">Mua ngay</button>
    </div>

    <div class="card">
      <div class="name">Proxy 7 Ngày</div>
      <div class="price">70VND</div>
      <button class="btn" onclick="buy()">Mua ngay</button>
    </div>

    <div class="card">
      <div class="name">Proxy 30 Ngày</div>
      <div class="price">150VND</div>
      <button class="btn" onclick="buy()">Mua ngay</button>
    </div>
  </div>

  <!-- FREE -->
  <div class="column">
    <div class="section-title">FREE</div>

    <div class="card free-card" onclick="openFree()">
      <div class="name">Proxy Pin Mod</div>
      <div class="price">FREE</div>
      <div>Click để tải</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Proxy Pin Mod</h3>
    <p>Nhấn nút bên dưới để tải</p>
    <a href="https://link4m.com/GyCC2" target="_blank">Tải ngay</a>
    <br><br>
    <button class="btn" onclick="closeModal()">Đóng</button>
  </div>
</div>

<script>
function buy(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openFree(){
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* snow */
function createSnow() {
  const snowContainer = document.querySelector('.snow');

  for (let i = 0; i < 60; i++) {
    let snow = document.createElement('div');
    snow.classList.add('snowflake');
    snow.innerHTML = "❄";

    snow.style.left = Math.random() * 100 + "vw";
    snow.style.animationDuration = (Math.random() * 4 + 3) + "s";
    snow.style.fontSize = (Math.random() * 8 + 10) + "px";

    snowContainer.appendChild(snow);
  }
}

createSnow();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Shop</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f3f4f6;
  color: #111;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px 15px;
}

.avatar {
  width: 80px;
  border-radius: 50%;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.title {
  margin-top: 10px;
  font-weight: 600;
}

.sub {
  font-size: 13px;
  color: #6b7280;
}

.status {
  font-size: 12px;
  color: #22c55e;
}

/* SHOP */
.shop {
  padding: 15px;
}

/* CARD */
.item {
  background: white;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.2s;
  border: 1px solid #e5e7eb;
}

.item:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.item:active {
  transform: scale(0.97);
}

.item.active {
  border: 1px solid #2563eb;
  box-shadow: 0 0 10px rgba(37,99,235,0.3);
}

/* TEXT */
.name {
  font-weight: 500;
}

.price {
  font-size: 13px;
  color: #6b7280;
}

/* BUTTON */
.buy {
  padding: 7px 14px;
  border-radius: 10px;
  background: #2563eb;
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.buy:hover {
  background: #1d4ed8;
}

.buy:active {
  transform: scale(0.9);
}

/* CONTACT */
.contact {
  margin: 20px 15px;
}

.contact-box {
  background: white;
  border-radius: 14px;
  padding: 10px;
  border: 1px solid #e5e7eb;
}

.contact-item {
  display: flex;
  align-items: center;
  padding: 10px;
  border-radius: 10px;
  transition: 0.2s;
  cursor: pointer;
}

.contact-item:hover {
  background: #f3f4f6;
}

.contact-item img {
  width: 35px;
  border-radius: 50%;
  margin-right: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 13px;
  padding: 15px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="header">
  <img src="K.PNG" class="avatar">
  <div class="title">Proxy Premium Shop</div>
  <div class="sub">Dịch vụ FF • Aim </div>
  <div class="status">● Online</div>
</div>

<div class="shop">

<div class="item">
  <div>
    <div class="name">Proxy Premium 1 Ngày</div>
    <div class="price">30VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

<div class="item">
  <div>
    <div class="name">Proxy Premium 7 Ngày</div>
    <div class="price">70VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

<div class="item">
  <div>
    <div class="name">Proxy Premium 30 Ngày</div>
    <div class="price">150VND</div>
  </div>
  <button class="buy" onclick="buy(this)">Mua</button>
</div>

</div>

<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
      <div>Zalo: 84989288257</div>
    </div>

    <div class="contact-item" onclick="openDiscord()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
      <div>Discord Server</div>
    </div>
  </div>
</div>

<div class="footer">
⚠️ IB Zalo để được tư vấn trực tiếp
</div>

<script>
function buy(btn){
  const item = btn.closest('.item');
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
  item.classList.add('active');

  btn.innerText = "Đang mở...";
  setTimeout(()=>{
    window.open("https://zalo.me/84989288257","_blank");
    btn.innerText = "Mua";
  },300);
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openDiscord(){
  window.open("https://discord.gg/yzRS57WB","_blank");
}
</script>

</body>
</html>

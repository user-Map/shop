<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  font-family: -apple-system, BlinkMacSystemFont;
}

/* CARD */
.card {
  --main-col: #ffeba7;
  --bg-col: #2a2b38;
  --bg-field: #1f2029;

  width: 320px;
  padding: 2rem 1.5rem;
  text-align: center;
  background: var(--bg-col);
  border-radius: 12px;
  border: 1px solid var(--main-col);
  box-shadow: 0 0 30px rgba(255,235,167,0.1);
}

/* TITLE */
.title {
  margin-bottom: 1.5rem;
  font-size: 1.6em;
  font-weight: 600;
  color: var(--main-col);
  text-shadow: 0 0 10px var(--main-col);
  text-transform: uppercase;
}

/* FIELD */
.field {
  margin-top: 0.8rem;
  display: flex;
  align-items: center;
  padding: 0.6rem;
  gap: 0.5rem;
  background-color: var(--bg-field);
  border-radius: 6px;
}

.input-field {
  background: transparent;
  border: none;
  outline: none;
  width: 100%;
  color: var(--main-col);
}

/* BUTTON */
.btn {
  margin-top: 1.2rem;
  width: 100%;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  padding: 0.8em;
  background-color: var(--main-col);
  color: var(--bg-col);
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background-color: var(--bg-field);
  color: var(--main-col);
  box-shadow: 0 0 15px rgba(255,235,167,0.3);
}

.note {
  margin-top: 10px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="card" id="auth">
  <div class="title">UserMap Login</div>

  <div class="field">
    <input id="email" class="input-field" type="email" placeholder="Email">
  </div>

  <div class="field">
    <input id="password" class="input-field" type="password" placeholder="Password">
  </div>

  <button class="btn" onclick="login()">LOGIN</button>

  <div class="note">Auto create account nếu chưa có</div>
</div>

<div id="app" style="display:none; color:white; text-align:center;">
  <h2>Welcome 👋</h2>
  <div id="user"></div>
  <div id="balance"></div>
</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://chmrhqbjpzqdercnngsj.supabase.co",
  "YOUR_ANON_KEY"
);

let currentUser = null;

/* AUTO LOGIN + REGISTER */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  let { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    const res = await supabaseClient.auth.signUp({
      email,
      password
    });

    if(res.data.user){
      const retry = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      currentUser = retry.data.user;
      showApp();
    } else {
      alert(error.message);
    }

  } else {
    currentUser = data.user;
    showApp();
  }
}

function showApp(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("user").innerText = currentUser.email;
}

/* AUTO SESSION */
supabaseClient.auth.getSession().then(({ data }) => {
  if(data.session){
    currentUser = data.session.user;
    showApp();
  }
});
</script>

</body>
</html>

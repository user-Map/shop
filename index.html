<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Packages</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  overflow-x: hidden;
}

/* SNOW */
.snow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

.snowflake {
  position: absolute;
  top: -10px;
  color: white;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
}

/* avatar glass */
.avatar-wrapper {
  width: 95px;
  height: 95px;
  margin: 0 auto 12px;
  padding: 3px;
  border-radius: 50%;
  background: linear-gradient(45deg, #3b82f6, #22c55e, #a855f7);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}

.avatar-wrapper:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px rgba(59,130,246,0.6);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  background: #fff;
}

.title {
  font-size: 22px;
  font-weight: 700;
}

.sub {
  font-size: 13px;
  color: #cbd5f5;
}

/* packages */
.packages {
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 20px;
}

/* glass card */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  transition: 0.3s;
  position: relative;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card.active {
  border: 1px solid #3b82f6;
  box-shadow: 0 0 20px rgba(59,130,246,0.5);
}

.badge {
  position: absolute;
  top: -10px;
  right: 15px;
  background: linear-gradient(45deg, #ef4444, #f59e0b);
  color: white;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 8px;
}

/* text */
.name {
  font-weight: 600;
  font-size: 17px;
}

.price {
  font-size: 24px;
  font-weight: bold;
  margin: 10px 0;
  color: #60a5fa;
}

.features {
  font-size: 13px;
  color: #cbd5f5;
  margin-bottom: 15px;
}

.features div {
  margin: 5px 0;
}

/* button */
.btn {
  width: 100%;
  padding: 11px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.btn:active {
  transform: scale(0.96);
}

/* contact glass */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

.contact-item {
  display: flex;
  align-items: center;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.contact-item:hover {
  background: rgba(255,255,255,0.1);
}

.contact-item img {
  width: 35px;
  height: 35px;
  object-fit: contain;
  border-radius: 50%;
  margin-right: 10px;
}

/* footer */
.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  padding: 20px;
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy Premium</div>
  <div class="sub">Chọn gói phù hợp với bạn</div>
</div>

<div class="packages">

<div class="card" onclick="selectCard(this)">
  <div class="name">Proxy Premium 1 Ngày</div>
  <div class="price">30VND</div>
  <div class="features">
    <div>✔ Dùng 24h</div>
    <div>✔ Tốc độ cao</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

<div class="card" onclick="selectCard(this)">
  <div class="name">Proxy Premium 7 Ngày</div>
  <div class="price">70VND</div>
  <div class="features">
    <div>✔ Dùng 7 ngày</div>
    <div>✔ Ổn định cao</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

<div class="card" onclick="selectCard(this)">
  <div class="badge">HOT</div>
  <div class="name">Proxy Premium 30 Ngày</div>
  <div class="price">150VND</div>
  <div class="features">
    <div>✔ Dùng 30 ngày</div>
    <div>✔ Support DragAim</div>
  </div>
  <button class="btn" onclick="buy(event)">Mua ngay</button>
</div>

</div>

<div class="contact">
  <div class="contact-box">

    <div class="contact-item" onclick="openZalo()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
      <div>Zalo Chat</div>
    </div>

    <div class="contact-item" onclick="openDiscord()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
      <div>Sever Có Proxy Miễn Phí</div>
    </div>

  </div>
</div>

<div class="footer">
⚠️ IB để được hỗ trợ nhanh
</div>

<script>
function selectCard(card){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
}

function buy(e){
  e.stopPropagation();
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openDiscord(){
  window.open("https://discord.gg/BuzAJg4MtE","_blank");
}

/* snow */
function createSnow() {
  const snowContainer = document.querySelector('.snow');

  for (let i = 0; i < 60; i++) {
    let snow = document.createElement('div');
    snow.classList.add('snowflake');
    snow.innerHTML = "❄";

    snow.style.left = Math.random() * 100 + "vw";
    snow.style.animationDuration = (Math.random() * 4 + 3) + "s";
    snow.style.fontSize = (Math.random() * 8 + 10) + "px";
    snow.style.opacity = Math.random();

    snowContainer.appendChild(snow);
  }
}

createSnow();
</script>

</body>
</html>

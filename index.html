<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy UserMap</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow-x: hidden;
}

/* SNOW */
.snow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
}

.snowflake {
  position: absolute;
  top: -10px;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
  transform: translateZ(0);
}

.avatar-wrapper {
  width: 100px;
  height: 100px;
  margin: 0 auto 12px;
  padding: 3px;
  border-radius: 50%;
  background: linear-gradient(45deg, #3b82f6, #22c55e, #a855f7);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 30px rgba(59,130,246,0.5);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.sub {
  font-size: 13px;
  color: #94a3b8;
}

/* PACKAGES */
.packages {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.section-title {
  text-align: center;
  margin: 10px 0;
  font-weight: bold;
  color: #60a5fa;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 20px;
  transition: 0.25s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transform-style: preserve-3d;
}

.card::before {
  content: "";
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 60%);
  animation: glowMove 10s linear infinite;
}

@keyframes glowMove {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* HOVER TILT */
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.card:active {
  transform: scale(0.97);
}

.name {
  font-size: 18px;
  font-weight: 600;
}

.price {
  font-size: 26px;
  font-weight: bold;
  color: #60a5fa;
  margin: 10px 0;
}

.features {
  font-size: 13px;
  color: #cbd5f5;
}

.features div {
  margin: 5px 0;
}

/* BUTTON */
.btn {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(45deg, #3b82f6, #2563eb);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.95);
}

/* FREE */
.free-card {
  border: 1px solid rgba(34,197,94,0.4);
  background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(59,130,246,0.08));
}

.free-badge {
  position: absolute;
  top: -10px;
  right: 15px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  padding: 4px 10px;
  font-size: 11px;
  border-radius: 8px;
  font-weight: bold;
}

/* DETAIL PANEL (slide up) */
.detail {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: rgba(15,23,42,0.98);
  backdrop-filter: blur(20px);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 20px;
  transition: 0.35s ease;
  z-index: 99999;
}

.detail.show {
  bottom: 0;
}

.detail h3 {
  margin-top: 0;
}

.close-btn {
  margin-top: 10px;
  background: #ef4444;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  justify-content: center;
  align-items: center;
  z-index: 99999;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: rgba(15,23,42,0.95);
  padding: 25px;
  border-radius: 16px;
  width: 85%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  animation: pop 0.25s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* CONTACT */
.contact {
  margin: 20px;
}

.contact-box {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

.contact-item {
  display: flex;
  align-items: center;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
}

.contact-item:hover {
  background: rgba(255,255,255,0.1);
}

.contact-item img {
  width: 35px;
  height: 35px;
  margin-right: 10px;
}

.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  padding: 20px;
}
</style>
</head>

<body>

<div class="snow"></div>

<div class="header">
  <div class="avatar-wrapper">
    <img src="K.PNG" class="avatar">
  </div>
  <div class="title">Proxy UserMap</div>
  <div class="sub">Chọn gói phù hợp với bạn</div>
</div>

<div class="packages">

<div class="section-title">BUY NOW</div>

<div class="card" onclick="openDetail('1 Day','30VND','Dùng 24h - tốc độ cao')">
  <div class="name">Proxy Premium 1 Ngày</div>
  <div class="price">30VND</div>
  <div class="features">
    <div>✔ Dùng 24h</div>
    <div>✔ Tốc độ cao</div>
  </div>
</div>

<div class="card" onclick="openDetail('7 Days','70VND','Ổn định cao')">
  <div class="name">Proxy Premium 7 Ngày</div>
  <div class="price">70VND</div>
</div>

<div class="card" onclick="openDetail('30 Days','150VND','Full support + DragAim')">
  <div class="name">Proxy Premium 30 Ngày</div>
  <div class="price">150VND</div>
</div>

<div class="section-title">FREE</div>

<div class="card free-card" onclick="openFree()">
  <div class="free-badge">FREE</div>
  <div class="name">Proxy Pin Mod</div>
  <div class="price">0 VND</div>
</div>

</div>

<!-- DETAIL PANEL -->
<div id="detail" class="detail">
  <h3 id="dTitle"></h3>
  <p id="dDesc"></p>
  <button class="btn" onclick="buy()">Mua ngay</button>
  <button class="btn close-btn" onclick="closeDetail()">Đóng</button>
</div>

<!-- MODAL FREE -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Proxy Pin Mod</h3>
    <p>Bấm để tải file</p>
    <button class="btn" onclick="goDownload()">Tải ngay</button>
    <br><br>
    <button class="btn" onclick="closeModal()">Đóng</button>
  </div>
</div>

<div class="contact">
  <div class="contact-box">
    <div class="contact-item" onclick="openZalo()">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg">
      <div>Zalo Chat</div>
    </div>
  </div>
</div>

<div class="footer">⚠️ IB để được hỗ trợ nhanh</div>

<script>
function buy(){
  window.open("https://zalo.me/84989288257","_blank");
}

function openZalo(){
  window.open("https://zalo.me/84989288257","_blank");
}

/* DETAIL */
function openDetail(title, price, desc){
  document.getElementById("detail").classList.add("show");
  document.getElementById("dTitle").innerText = title + " - " + price;
  document.getElementById("dDesc").innerText = desc;
}

function closeDetail(){
  document.getElementById("detail").classList.remove("show");
}

/* FREE MODAL */
function openFree(){
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function goDownload(){
  window.open("https://link4m.com/GyCC2","_blank");
}

/* SNOW */
const snow = document.querySelector('.snow');

for(let i=0;i<60;i++){
  let s = document.createElement('div');
  s.className = 'snowflake';
  s.innerHTML = "❄";
  s.style.left = Math.random()*100+"vw";
  s.style.animationDuration = (Math.random()*4+3)+"s";
  s.style.fontSize = (Math.random()*10+10)+"px";
  snow.appendChild(s);
}
</script>

</body>
</html>
